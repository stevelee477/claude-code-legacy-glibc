name: Build Claude Code (Alpine/musl)

on:
  workflow_dispatch:
  schedule:
    # Check for new versions every 6 hours
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.check.outputs.latest_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check latest Claude Code version
        id: check
        run: |
          # Use the official native binary version source (same as claude.ai/install.sh)
          GCS_BASE="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          LATEST=$(curl -fsSL "${GCS_BASE}/latest" | tr -d '[:space:]')
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Claude Code version: $LATEST"

          # Check if we already have a release for this version
          RELEASE_EXISTS=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${LATEST}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$RELEASE_EXISTS" = "200" ]; then
            echo "Release v${LATEST} already exists, skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v${LATEST} detected, will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and extract
        run: |
          DOCKER_BUILDKIT=1 docker build --no-cache --progress=plain --output type=local,dest=./dist .

      - name: Test on CentOS 7 (glibc 2.17)
        run: |
          docker run --rm -v "$PWD/dist:/claude-code" centos:7 bash -c '
            set -e
            ln -fs /claude-code/lib/ld-musl-x86_64.so.1 /lib/ld-musl-x86_64.so.1

            echo "=== Testing claude ==="
            CLAUDE_VER=$(/claude-code/bin/claude --version)
            echo "$CLAUDE_VER"
            echo "$CLAUDE_VER" | grep -qE "^[0-9]+\.[0-9]+" || { echo "FAIL: unexpected version output"; exit 1; }
            echo "claude: OK"

            echo "=== Testing rg ==="
            /claude-code/bin/rg --version
            echo "test content" > /tmp/test.txt
            /claude-code/bin/rg "test" /tmp/test.txt
            echo "rg: OK"
          '

      - name: Get version
        id: version
        run: |
          # Always use the clean version from GCS (e.g. "2.1.90") for the tag,
          # not claude --version which may include suffixes like "(ClaudeCode)"
          VERSION="${{ needs.check.outputs.latest_version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Package tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd dist
          tar czf "../claude-code-musl-x86_64-v${VERSION}.tar.gz" .
          cd ..
          sha256sum "claude-code-musl-x86_64-v${VERSION}.tar.gz" > "claude-code-musl-x86_64-v${VERSION}.tar.gz.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Claude Code v${{ steps.version.outputs.version }} (musl)
          body: |
            ## Claude Code v${{ steps.version.outputs.version }} — musl/Alpine build

            Portable build for Linux systems with old glibc (CentOS 7, RHEL 7, etc.)

            ### One-liner install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### Manual install

            ```bash
            # Download and extract
            tar xzf claude-code-musl-x86_64-v${{ steps.version.outputs.version }}.tar.gz -C ~/.local/share/claude-code

            # Symlink musl loader (one-time)
            sudo ln -fs ~/.local/share/claude-code/lib/ld-musl-x86_64.so.1 /lib/ld-musl-x86_64.so.1

            # Add to PATH
            export PATH="$HOME/.local/share/claude-code/bin:$PATH"
            ```
          files: |
            claude-code-musl-x86_64-v${{ steps.version.outputs.version }}.tar.gz
            claude-code-musl-x86_64-v${{ steps.version.outputs.version }}.tar.gz.sha256
